---
- name: Install packages
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install apt packages
      apt:
        name:
          - vim
          - cron
          - golang-go
          - netcat-traditional
          - ssh
          - openssh-server
        state: present
